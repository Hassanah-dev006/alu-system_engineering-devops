<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            background: #1b1b2f;
            color: #e8c677;
            font-family: Georgia, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 8rem; margin: 0; }
        p { font-size: 1.5rem; font-style: italic; margin: 1rem 0; }
        .sub { color: #888; font-size: 1rem; font-style: normal; }
        a {
            display: inline-block;
            margin-top: 1.5rem;
            color: #1b1b2f;
            background: #e8c677;
            padding: 0.6rem 1.8rem;
            border-radius: 30px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>Ceci n'est pas une page</p>
        <p class="sub">The page you're looking for doesn't exist.</p>
        <a href="/">Go Home</a>
    </div>
</body>
</html>
